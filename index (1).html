function Icon({ name, size = 20, color = "currentColor", strokeWidth = 2, className = "" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color}
      strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}
      dangerouslySetInnerHTML={{ __html: ICON_PATHS[name] || "" }} />
  );
}

const BASE_SYSTEM = `Eres el motor de contenido de una app educativa de historia y economía para el público general del Perú. Respondes en español, claro y sin tecnicismos.
Si la pregunta menciona específicamente Chepén (La Libertad, Perú) o pide datos locales/actuales, usa la búsqueda web para dar información real y verificada sobre Chepén. Si la pregunta es general (no sobre Chepén), responde con tu conocimiento sin necesidad de buscar, salvo que se pidan datos actuales.`;
const DEEP_SYSTEM = `Eres el motor de contenido de una app educativa de historia y economía para el público general del Perú.
El usuario pidió un análisis profundo: da una explicación bien fundamentada con causas, consecuencias y distintas perspectivas, en varios párrafos si el tema lo amerita. Usa la búsqueda web para verificar fechas, cifras o datos, especialmente si la pregunta es sobre Chepén (La Libertad, Perú) o pide información actual. Responde en español con precisión pero en lenguaje accesible.`;
const QUIZ_SYSTEM = `Generas cuestionarios educativos de opción múltiple en español a partir de un documento o texto que te da el usuario.
Responde ÚNICAMENTE con un objeto JSON válido, sin texto adicional, sin explicaciones, sin marcadores de código (nada de \`\`\`). La estructura exacta debe ser:
{"title": "string breve", "questions": [{"question": "string", "options": ["op1","op2","op3","op4"], "correctIndex": 0}]}
Genera entre 5 y 8 preguntas basadas exclusivamente en el contenido dado, de nivel escolar, con 4 alternativas cada una y solo una correcta.`;

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function titleFromText(t) {
  const clean = (t || "Nueva conversación").replace(/\s+/g, " ").trim();
  return clean.length > 40 ? clean.slice(0, 40) + "…" : clean || "Nueva conversación";
}
function stripJsonFence(s) { return s.replace(/```json|```/g, "").trim(); }

function renderText(text) {
  const parts = String(text).split(/(\*\*[^*]+\*\*)/g);
  return parts.map((part, i) => {
    if (part.startsWith("**") && part.endsWith("**")) {
      return <strong key={i}>{part.slice(2, -2)}</strong>;
    }
    return part;
  });
}

async function callBackend({ messages, system, useTools, maxTokens }) {
  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ system, messages, useTools, maxTokens }),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data?.error?.message || data?.error || "Error al contactar el servicio");
  const text = (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n\n");
  return text || "No obtuve una respuesta. Intenta de nuevo.";
}

function fileToPayload(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    const isPdf = file.type === "application/pdf";
    reader.onload = () => {
      if (isPdf) resolve({ kind: "pdf", name: file.name, data: reader.result.split(",")[1] });
      else resolve({ kind: "text", name: file.name, data: reader.result });
    };
    reader.onerror = () => reject(new Error("No se pudo leer el archivo"));
    if (isPdf) reader.readAsDataURL(file); else reader.readAsText(file);
  });
}

// ---- localStorage helpers (replacement for Claude-artifact storage) ----
const store = {
  get(key) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; } },
  set(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} },
  remove(key) { try { localStorage.removeItem(key); } catch {} },
};

function TabBar({ active, onChange, onCreate }) {

    <button onClick={() => onChange(id)} className="flex flex-col items-center justify-center gap-1 flex-1 py-2"
      style={{ color: active === id ? C.ochre : C.textDim }}>
      <Icon name={icon} size={22} strokeWidth={active === id ? 2.4 : 1.8} />

  );
  return (
    <div className="flex items-center px-2 pt-1" style={{ backgroundColor: C.panel, borderTop: `1px solid ${C.border}` }}>
      <Item id="home" icon="home" label="Inicio" />

        <button onClick={onCreate} className="rounded-full flex items-center justify-center -mt-5 shadow-lg"

function StrataToggle({ deep, onChange }) {
  const layers = 4, filled = deep ? layers : 1;
  return (
    <button onClick={() => onChange(!deep)} className="flex items-center gap-2 px-3 py-1.5 rounded-md"
      style={{ backgroundColor: deep ? C.ochreDim : C.panelAlt, border: `1px solid ${deep ? C.ochre : C.border}` }}>
      <div className="flex flex-col-reverse gap-[2px]" style={{ width: 12, height: 16 }}>
        {Array.from({ length: layers }).map((_, i) => (
          <div key={i} style={{ height: 3, borderRadius: 1, backgroundColor: i < filled ? (deep ? C.ochre : C.textDim) : "#3A3226" }} />
        ))}
      </div>
      <span className="text-[11px] font-medium tracking-wide" style={{ color: deep ? C.ochre : C.textDim }}>
        {deep ? "PROFUNDO" : "BÁSICO"}
      </span>
    </button>
  );
}

function Bubble({ msg }) {
  const isUser = msg.role === "user";
  return (
    <div className={`flex ${isUser ? "justify-end" : "justify-start"} mb-3`}>
      <div className="max-w-[85%] px-4 py-2.5 rounded-2xl text-sm leading-relaxed whitespace-pre-wrap"
        style={{ backgroundColor: isUser ? C.clay : C.panelAlt, color: C.text,
          borderTopRightRadius: isUser ? 4 : undefined, borderTopLeftRadius: !isUser ? 4 : undefined }}>
        {msg.attachmentName && (
          <div className="flex items-center gap-1.5 text-xs mb-2 pb-2" style={{ borderBottom: "1px solid rgba(255,255,255,0.15)", opacity: 0.85 }}>
            <Icon name="file" size={13} /> {msg.attachmentName}
          </div>
        )}
        {msg.deep && !isUser && (
          <div className="flex items-center gap-1 text-[11px] mb-1.5 font-medium" style={{ color: C.ochre }}>
            <Icon name="layers" size={11} /> ANÁLISIS PROFUNDO
          </div>
        )}
        {renderText(msg.content)}
      </div>
    </div>
  );
}

function ChatTab(props) {
  const { conversations, order, currentId, setCurrentId, onNewChat, onDelete, onSend,
    loading, error, deepMode, setDeepMode, presetInput, clearPreset } = props;
  const [input, setInput] = useState("");
  const [attachment, setAttachment] = useState(null);
  const [showList, setShowList] = useState(false);
  const scrollRef = useRef(null);
  const fileInputRef = useRef(null);

  useEffect(() => { if (presetInput) { setInput(presetInput); clearPreset(); } }, [presetInput]);
  useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [currentId, conversations, loading]);

  const conv = currentId ? conversations[currentId] : null;

  async function handleFilePick(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    try { setAttachment(await fileToPayload(file)); } catch (err) {}
    e.target.value = "";
  }
  function submit() {
    if (!input.trim() && !attachment) return;
    onSend(input, attachment, deepMode);
    setInput(""); setAttachment(null);
  }
  function handleKeyDown(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submit(); } }

  return (
    <div className="flex-1 flex flex-col min-h-0 relative">
      <div className="flex items-center justify-between px-4 py-2.5" style={{ borderBottom: `1px solid ${C.border}` }}>
        <button onClick={() => setShowList(true)} className="flex items-center gap-2 text-sm truncate" style={{ color: C.textDim }}>
          <Icon name="chat" size={15} /> <span className="truncate max-w-[140px]">{conv?.title || "Nueva conversación"}</span>
        </button>
        <StrataToggle deep={deepMode} onChange={setDeepMode} />
      </div>

      {showList && (
        <div className="absolute inset-0 z-10 flex flex-col" style={{ backgroundColor: C.bg }}>
          <div className="flex items-center gap-2 px-4 py-3" style={{ borderBottom: `1px solid ${C.border}` }}>
            <button onClick={() => setShowList(false)} style={{ color: C.text }}><Icon name="chevronLeft" size={20} /></button>
            <span className="text-sm font-medium" style={{ color: C.text }}>Tus consultas</span>
          </div>
          <button onClick={() => { onNewChat(); setShowList(false); }}
            className="mx-4 mt-3 flex items-center justify-center gap-2 py-2 rounded-md text-sm font-medium"
            style={{ backgroundColor: C.ochreDim, color: C.text }}>
            <Icon name="plus" size={16} /> Nueva conversación
          </button>
          <div className="flex-1 overflow-y-auto px-3 mt-3">
            {order.map((id) => {
              const c = conversations[id];
              if (!c) return null;
              return (
                <div key={id} onClick={() => { setCurrentId(id); setShowList(false); }}
                  className="group flex items-center gap-2 px-3 py-2.5 mb-1 rounded-md cursor-pointer text-sm"
                  style={{ backgroundColor: id === currentId ? C.panelAlt : "transparent", color: C.text }}>
                  <span className="truncate flex-1">{c.title}</span>
                  <span onClick={(e) => { e.stopPropagation(); onDelete(id); }}><Icon name="trash" size={14} className="opacity-60" /></span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div ref={scrollRef} className="flex-1 overflow-y-auto px-4 py-4 min-h-0">
        {(!conv || conv.messages.length === 0) && (
          <div className="h-full flex flex-col items-center justify-center text-center px-4">
            <Icon name="layers" size={32} color={C.ochreDim} className="mb-3" />
            <p className="text-sm max-w-xs" style={{ color: C.textDim }}>
              Pregunta sobre historia o economía. Activa <strong style={{ color: C.ochre }}>profundo</strong> para un análisis más completo.
            </p>
          </div>
        )}
        {conv?.messages.map((m, i) => <Bubble key={i} msg={m} />)}
        {loading && (
          <div className="flex justify-start mb-3">
            <div className="px-4 py-2.5 rounded-2xl text-sm flex items-center gap-2" style={{ backgroundColor: C.panelAlt, color: C.textDim, borderTopLeftRadius: 4 }}>
              {deepMode && <Icon name="search" size={13} />}
              {deepMode ? "Investigando…" : "Escribiendo…"}
            </div>
          </div>
        )}
        {error && <div className="text-sm px-3 py-2 rounded-md mb-3" style={{ backgroundColor: "#4A2020", color: "#F1CFCF" }}>{error}</div>}
      </div>

      <div className="px-4 pb-4 pt-2" style={{ borderTop: `1px solid ${C.border}` }}>
        {attachment && (
          <div className="flex items-center gap-2 mb-2 px-3 py-1.5 rounded-md text-xs w-fit" style={{ backgroundColor: C.panelAlt, color: C.text }}>
            <Icon name="file" size={13} /> {attachment.name}
            <span onClick={() => setAttachment(null)}><Icon name="x" size={13} className="cursor-pointer opacity-70" /></span>
          </div>
        )}
        <div className="flex items-end gap-2">
          <input type="file" accept=".txt,.md,.csv,.pdf" ref={fileInputRef} className="hidden" onChange={handleFilePick} />
          <button onClick={() => fileInputRef.current?.click()} className="p-2.5 rounded-md flex-shrink-0" style={{ backgroundColor: C.panelAlt, color: C.textDim }}>
            <Icon name="paperclip" size={17} />
          </button>
          <textarea value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={handleKeyDown}
            placeholder="Escribe tu pregunta…" rows={1}
            className="flex-1 resize-none px-3 py-2.5 rounded-md text-sm outline-none"
            style={{ backgroundColor: C.panelAlt, color: C.text, border: `1px solid ${C.border}` }} />
          <button onClick={submit} disabled={loading || (!input.trim() && !attachment)}
            className="p-2.5 rounded-md flex-shrink-0 disabled:opacity-40" style={{ backgroundColor: C.ochre, color: "#17140F" }}>
            <Icon name="send" size={17} />
          </button>
        </div>
      </div>
    </div>
  );
}

function QuizPlayer({ quiz, onExit, onFinish }) {
  const [idx, setIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [correctCount, setCorrectCount] = useState(0);
  const [done, setDone] = useState(false);
  const q = quiz.questions[idx];

  function pick(i) {
    if (selected !== null) return;
    setSelected(i);
    if (i === q.correctIndex) setCorrectCount((c) => c + 1);
  }
  function next() {
    if (idx + 1 < quiz.questions.length) { setIdx(idx + 1); setSelected(null); }
    else { setDone(true); onFinish(correctCount); }
  }

  if (done) {
    const total = quiz.questions.length;
    const pct = Math.round((correctCount / total) * 100);
    return (
      <div className="flex-1 flex flex-col items-center justify-center px-6 text-center">
        <div className="text-4xl font-bold mb-2" style={{ color: C.ochre, fontFamily: "Georgia, serif" }}>{pct}%</div>
        <p className="text-sm mb-6" style={{ color: C.text }}>{correctCount} de {total} respuestas correctas</p>
        <button onClick={onExit} className="px-5 py-2.5 rounded-md text-sm font-medium" style={{ backgroundColor: C.ochreDim, color: C.text }}>
          Volver a cuestionarios
        </button>
      </div>
    );
  }

  return (
    <div className="flex-1 flex flex-col min-h-0">
      <div className="flex items-center gap-2 px-4 py-3" style={{ borderBottom: `1px solid ${C.border}` }}>
        <button onClick={onExit} style={{ color: C.text }}><Icon name="chevronLeft" size={20} /></button>
        <span className="text-xs" style={{ color: C.textDim }}>Pregunta {idx + 1} de {quiz.questions.length}</span>
      </div>
      <div className="flex-1 overflow-y-auto px-5 py-6">
        <p className="text-base mb-6" style={{ color: C.text }}>{q.question}</p>
        <div className="flex flex-col gap-2.5">
          {q.options.map((opt, i) => {
            let bg = C.panelAlt, border = C.border;
            if (selected !== null) {
              if (i === q.correctIndex) { bg = "rgba(76,138,94,0.25)"; border = C.green; }
              else if (i === selected) { bg = "rgba(166,73,63,0.25)"; border = C.red; }
            }
            return (
              <button key={i} onClick={() => pick(i)} className="text-left px-4 py-3 rounded-md text-sm flex items-center justify-between"
                style={{ backgroundColor: bg, border: `1px solid ${border}`, color: C.text }}>
                <span>{opt}</span>
                {selected !== null && i === q.correctIndex && <Icon name="check" size={16} color={C.green} />}
                {selected !== null && i === selected && i !== q.correctIndex && <Icon name="x" size={16} color={C.red} />}
              </button>
            );
          })}
        </div>
      </div>
      {selected !== null && (
        <div className="px-5 pb-5">
          <button onClick={next} className="w-full py-2.5 rounded-md text-sm font-medium" style={{ backgroundColor: C.ochre, color: "#17140F" }}>
            {idx + 1 < quiz.questions.length ? "Siguiente" : "Finalizar"}
          </button>
        </div>
      )}
    </div>
  );
}

function QuizzesTab({ quizzes, onOpen, onDelete, onCreate, generating }) {
  const ids = Object.keys(quizzes).sort((a, b) => quizzes[b].createdAt - quizzes[a].createdAt);
  return (
    <div className="flex-1 overflow-y-auto px-4 py-5">
      <h2 className="text-lg mb-4" style={{ color: C.text, fontFamily: "Georgia, serif" }}>Cuestionarios</h2>

        <div className="rounded-xl p-4 mb-3 flex items-center gap-3" style={{ backgroundColor: C.panelAlt, border: `1px solid ${C.border}` }}>
          <Icon name="sparkles" size={16} color={C.ochre} />
          <span className="text-sm" style={{ color: C.textDim }}>Generando preguntas…</span>
        </div>
      )}
      {ids.length === 0 && !generating && (
        <div className="text-center py-10">
          <Icon name="list" size={30} color={C.ochreDim} className="mx-auto mb-3" />
          <p className="text-sm mb-4" style={{ color: C.textDim }}>Aún no tienes cuestionarios.</p>
          <button onClick={onCreate} className="px-4 py-2 rounded-md text-sm font-medium" style={{ backgroundColor: C.ochreDim, color: C.text }}>
            Crear desde un archivo
          </button>
        </div>
      )}
      <div className="flex flex-col gap-2.5">
        {ids.map((id) => {
          const q = quizzes[id];
          return (
            <div key={id} onClick={() => onOpen(id)} className="group flex items-center gap-3 rounded-xl p-4 cursor-pointer"
              style={{ backgroundColor: C.panelAlt, border: `1px solid ${C.border}` }}>
              <Icon name="list" size={18} color={C.ochre} />
              <div className="flex-1 min-w-0">
                <p className="text-sm truncate" style={{ color: C.text }}>{q.title}</p>
                <p className="text-xs" style={{ color: C.textDim }}>{q.questions.length} preguntas · {q.sourceFileName}</p>
              </div>
              <span onClick={(e) => { e.stopPropagation(); onDelete(id); }}><Icon name="trash" size={15} className="opacity-60" /></span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ProfileTab({ profile, setName, stats }) {
  const [editing, setEditing] = useState(false);
  const [nameInput, setNameInput] = useState(profile.name);
  return (
    <div className="flex-1 overflow-y-auto px-4 py-6">
      <div className="flex flex-col items-center mb-6">
        <div className="rounded-full flex items-center justify-center mb-3" style={{ width: 64, height: 64, backgroundColor: C.ochreDim }}>
          <Icon name="user" size={28} color={C.text} />
        </div>
        {editing ? (
          <div className="flex items-center gap-2">
            <input value={nameInput} onChange={(e) => setNameInput(e.target.value)}
              className="px-2 py-1 rounded text-sm text-center outline-none"
              style={{ backgroundColor: C.panelAlt, color: C.text, border: `1px solid ${C.border}` }} />
            <button onClick={() => { setName(nameInput); setEditing(false); }} className="text-xs font-medium" style={{ color: C.ochre }}>Guardar</button>
          </div>
        ) : (
          <button onClick={() => setEditing(true)} className="text-base" style={{ color: C.text, fontFamily: "Georgia, serif" }}>
            {profile.name || "Estudiante"}
          </button>
        )}
      </div>
      <div className="grid grid-cols-2 gap-3">
        <div className="rounded-xl p-4 text-center" style={{ backgroundColor: C.panelAlt, border: `1px solid ${C.border}` }}>
          <p className="text-xl font-semibold" style={{ color: C.ochre }}>{stats.quizzesTaken}</p>
          <p className="text-xs" style={{ color: C.textDim }}>Cuestionarios hechos</p>
        </div>
        <div className="rounded-xl p-4 text-center" style={{ backgroundColor: C.panelAlt, border: `1px solid ${C.border}` }}>
          <p className="text-xl font-semibold" style={{ color: C.ochre }}>{stats.avgScore}%</p>
          <p className="text-xs" style={{ color: C.textDim }}>Promedio</p>
        </div>
        <div className="rounded-xl p-4 text-center col-span-2" style={{ backgroundColor: C.panelAlt, border: `1px solid ${C.border}` }}>
          <p className="text-xl font-semibold" style={{ color: C.ochre }}>{stats.conversations}</p>
          <p className="text-xs" style={{ color: C.textDim }}>Consultas realizadas</p>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("home");
  const [conversations, setConversations] = useState({});
  const [order, setOrder] = useState([]);
  const [currentId, setCurrentId] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [deepMode, setDeepMode] = useState(false);
  const [presetInput, setPresetInput] = useState(null);
  const [quizzes, setQuizzes] = useState({});
  const [generating, setGenerating] = useState(false);
  const [openQuizId, setOpenQuizId] = useState(null);
  const quizFileRef = useRef(null);
  const [profile, setProfile] = useState({ name: "Estudiante", quizResults: [] });

  useEffect(() => {
    const savedConvs = store.get("estrato-conversations") || {};
    const savedOrder = store.get("estrato-order") || [];
    const savedQuizzes = store.get("estrato-quizzes") || {};
    const savedProfile = store.get("estrato-profile");
    setConversations(savedConvs);
    setOrder(savedOrder);
    if (savedOrder.length > 0) setCurrentId(savedOrder[0]);
    setQuizzes(savedQuizzes);
    if (savedProfile) setProfile(savedProfile);
  }, []);

  function createNewConversation() {
    const id = uid();
    const conv = { id, title: "Nueva conversación", messages: [], updatedAt: Date.now() };
    const nextConvs = { ...conversations, [id]: conv };
    const nextOrder = [id, ...order];
    setConversations(nextConvs); setOrder(nextOrder); setCurrentId(id);
    store.set("estrato-conversations", nextConvs);
    store.set("estrato-order", nextOrder);
    return id;
  }

  async function handleDeleteConv(id) {
    const nextOrder = order.filter((o) => o !== id);
    const nextConvs = { ...conversations };
    delete nextConvs[id];
    setOrder(nextOrder); setConversations(nextConvs);
    store.set("estrato-conversations", nextConvs);
    store.set("estrato-order", nextOrder);
    if (currentId === id) {
      if (nextOrder.length > 0) setCurrentId(nextOrder[0]); else createNewConversation();
    }
  }

  async function handleSendChat(text, attachment, deep) {
    let convId = currentId;
    if (!convId || !conversations[convId]) convId = createNewConversation();
    const conv = conversations[convId] || { id: convId, title: "Nueva conversación", messages: [] };

    let apiContent = text.trim();
    let displayText = text.trim();
    let attachmentName = null;

    if (attachment) {
      attachmentName = attachment.name;
      if (attachment.kind === "pdf") {
        apiContent = [
          { type: "document", source: { type: "base64", media_type: "application/pdf", data: attachment.data } },
          { type: "text", text: text.trim() || "Resume este documento." },
        ];
      } else {
        apiContent = `${text.trim() || "Resume este documento."}\n\n--- Contenido de "${attachment.name}" ---\n${attachment.data}`;
        displayText = text.trim() || "Resume este documento.";
      }
    }

    const userMsg = { role: "user", content: displayText || `Analiza: ${attachmentName}`, apiContent, attachmentName };
    const newMessages = [...conv.messages, userMsg];
    const isFirst = conv.messages.length === 0;
    const updatedConv = { ...conv, messages: newMessages, title: isFirst ? titleFromText(displayText) : conv.title, updatedAt: Date.now() };
    const nextConvs = { ...conversations, [convId]: updatedConv };
    setConversations(nextConvs);
    setLoading(true); setError(null);

    try {
      const apiMessages = [...conv.messages.map((m) => ({ role: m.role, content: m.apiContent || m.content })), { role: "user", content: apiContent }];
      const system = deep ? DEEP_SYSTEM : BASE_SYSTEM;
      const responseText = await callBackend({ messages: apiMessages, system, useTools: true, maxTokens: 1500 });
      const assistantMsg = { role: "assistant", content: responseText, deep };
      const finalMessages = [...newMessages, assistantMsg];
      const finalConv = { ...updatedConv, messages: finalMessages, updatedAt: Date.now() };
      const finalConvs = { ...nextConvs, [convId]: finalConv };
      setConversations(finalConvs);
      const nextOrder = order.includes(convId) ? order : [convId, ...order];
      setOrder(nextOrder);
      store.set("estrato-conversations", finalConvs);
      store.set("estrato-order", nextOrder);
    } catch (err) {
      setError(err.message || "Ocurrió un error al generar la respuesta.");
    } finally {
      setLoading(false);
    }
  }

  function triggerQuizUpload() { quizFileRef.current?.click(); }

  async function handleQuizFile(e) {
    const file = e.target.files?.[0];
    e.target.value = "";
    if (!file) return;
    setTab("quizzes"); setGenerating(true); setError(null);
    try {
      const payload = await fileToPayload(file);
      let content;
      if (payload.kind === "pdf") {
        content = [
          { type: "document", source: { type: "base64", media_type: "application/pdf", data: payload.data } },
          { type: "text", text: "Genera el cuestionario a partir de este documento." },
        ];
      } else {
        content = `Genera el cuestionario a partir de este contenido:\n\n${payload.data}`;
      }
      const raw = await callBackend({ messages: [{ role: "user", content }], system: QUIZ_SYSTEM, useTools: false, maxTokens: 2000 });
      const parsed = JSON.parse(stripJsonFence(raw));
      const id = uid();
      const quiz = { id, title: parsed.title || file.name, questions: parsed.questions || [], sourceFileName: file.name, createdAt: Date.now() };
      const nextQuizzes = { ...quizzes, [id]: quiz };
      setQuizzes(nextQuizzes);
      store.set("estrato-quizzes", nextQuizzes);
    } catch (err) {
      setError("No se pudo generar el cuestionario. Intenta con otro archivo.");
    } finally {
      setGenerating(false);
    }
  }

  async function handleDeleteQuiz(id) {
    const nextQuizzes = { ...quizzes };
    delete nextQuizzes[id];
    setQuizzes(nextQuizzes);
    store.set("estrato-quizzes", nextQuizzes);
  }

  async function handleQuizFinish(correctCount) {
    const quiz = quizzes[openQuizId];
    if (!quiz) return;
    const pct = Math.round((correctCount / quiz.questions.length) * 100);
    const nextProfile = { ...profile, quizResults: [...(profile.quizResults || []), pct] };
    setProfile(nextProfile);
    store.set("estrato-profile", nextProfile);
  }

  async function handleSetName(name) {
    const nextProfile = { ...profile, name };
    setProfile(nextProfile);
    store.set("estrato-profile", nextProfile);
  }

  const stats = {
    quizzesTaken: (profile.quizResults || []).length,
    avgScore: (profile.quizResults || []).length ? Math.round(profile.quizResults.reduce((a, b) => a + b, 0) / profile.quizResults.length) : 0,
    conversations: order.length,
  };

  return (
    <div className="w-full h-screen flex flex-col overflow-hidden" style={{ backgroundColor: C.bg, fontFamily: "system-ui, sans-serif" }}>
      <input type="file" accept=".txt,.md,.csv,.pdf" ref={quizFileRef} className="hidden" onChange={handleQuizFile} />
      {tab !== "quizzes" && (
        <div className="flex items-center gap-2 px-4 py-3" style={{ borderBottom: `1px solid ${C.border}` }}>
          <Icon name="layers" size={18} color={C.ochre} />
          <span className="text-base tracking-wide" style={{ color: C.text, fontFamily: "Georgia, serif" }}>ESTRATO</span>
        </div>
      )}
      <div className="flex-1 flex flex-col min-h-0">
        {tab === "home" && <HomeTab onAskAbout={(text) => { setPresetInput(`Cuéntame más sobre esto: ${text}`); setTab("chat"); }} />}
        {tab === "chat" && (
          <ChatTab conversations={conversations} order={order} currentId={currentId} setCurrentId={setCurrentId}
            onNewChat={createNewConversation} onDelete={handleDeleteConv} onSend={handleSendChat}
            loading={loading} error={error} deepMode={deepMode} setDeepMode={setDeepMode}
            presetInput={presetInput} clearPreset={() => setPresetInput(null)} />
        )}
        {tab === "quizzes" && !openQuizId && (
          <QuizzesTab quizzes={quizzes} onOpen={(id) => setOpenQuizId(id)} onDelete={handleDeleteQuiz} onCreate={triggerQuizUpload} generating={generating} />
        )}
        {tab === "quizzes" && openQuizId && (
          <QuizPlayer quiz={quizzes[openQuizId]} onExit={() => setOpenQuizId(null)} onFinish={handleQuizFinish} />
        )}
        {tab === "profile" && <ProfileTab profile={profile} setName={handleSetName} stats={stats} />}
      </div>
      <TabBar active={tab} onChange={setTab} onCreate={triggerQuizUpload} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
